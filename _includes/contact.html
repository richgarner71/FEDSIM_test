<div class="flex-wrapper-big">
    <div class="infoblock">
        <h1>Contact US</h1>
    </div>
</div>

<div class="flex-wrapper-big">
    <form class="cf">
      <div class="half left cf">
        <input type="text" id="input-fname" placeholder="First Name">
        <input type="text" id="input-lname" placeholder="Last Name">
        <input type="text" id="input-agency" placeholder="Agency">
        <input type="text" id="input-company" placeholder="Company">
      </div>
      <div class="half right cf">
        <input type="email" id="input-email" placeholder="Email address">
        <input type="text" id="input-phone" placeholder="Phone">
        <textarea name="message" type="text" id="input-overview" placeholder="Project Overview" style="height:120px;"></textarea>
      </div>  
      <input type="submit" value="Submit" id="input-submit">
    </form>
</div>
